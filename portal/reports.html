<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財務報告 - AIcountant Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="portal.css">
</head>
<body class="portal-body">
    <div class="portal-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">AIcountant</div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><span class="icon">📊</span> 儀表板</a></li>
                    <li><a href="transactions.html"><span class="icon">💰</span> 交易記錄</a></li>
                    <li><a href="documents.html"><span class="icon">📄</span> 文件管理</a></li>
                    <li><a href="reports.html" class="active"><span class="icon">📈</span> 財務報告</a></li>
                    <li><a href="invoices.html"><span class="icon">🧾</span> 發票管理</a></li>
                    <li><a href="settings.html"><span class="icon">⚙️</span> 設置</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <span class="user-name" id="userName">客戶名稱</span>
                        <span class="user-role">企業帳戶</span>
                    </div>
                    <button class="logout-btn" onclick="logout()" title="登出">🚪</button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="page-header">
                <h1>財務報告</h1>
                <p>生成和下載您的財務報告</p>
            </header>
            <div class="content-card">
                <div class="card-header">
                    <h3>可用報告</h3>
                </div>
                <div class="card-body">
                    <p style="color: #666; text-align: center; padding: 48px 0;">財務報告功能開發中...</p>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Check if user is logged in
        (function() {
            const isLoggedIn = localStorage.getItem('aicountant-portal-logged-in');
            console.log('Page - Login check:', isLoggedIn);
            
            if (isLoggedIn !== 'true') {
                console.log('Not logged in, redirecting to login...');
                window.location.href = 'login.html';
                return;
            }
            
            // Display user name
            const userEmail = localStorage.getItem('aicountant-portal-user');
            console.log('Page - User:', userEmail);
            
            if (userEmail) {
                const userNameEl = document.getElementById('userName');
                if (userNameEl) {
                    userNameEl.textContent = userEmail.split('@')[0];
                }
            }
        })();

        // Logout function
        function logout() {
            console.log('Logging out...');
            localStorage.removeItem('aicountant-portal-logged-in');
            localStorage.removeItem('aicountant-portal-user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
