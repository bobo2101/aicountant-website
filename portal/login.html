<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶登入 - AIcountant Portal</title>
    <meta name="description" content="AIcountant 客戶登入系統，管理您的財務文件和會計記錄。">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="portal.css">
    <style>
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .demo-credentials {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #1565c0;
            margin-bottom: 20px;
        }
        .demo-credentials strong {
            display: block;
            margin-bottom: 4px;
        }
        .btn-loading {
            opacity: 0.7;
            pointer-events: none;
        }
        .btn-loading::after {
            content: '...';
        }
    </style>
</head>
<body class="portal-body">
    <div class="portal-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">AIcountant</div>
                <h1>客戶登入</h1>
                <p>歡迎回到您的財務管理中心</p>
            </div>
            
            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <strong>📝 演示帳戶（任意輸入即可登入）</strong>
                電郵：demo@aicountant.com<br>
                密碼：任意輸入
            </div>
            
            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">電郵地址</label>
                    <input type="email" id="email" name="email" placeholder="請輸入您的電郵" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" placeholder="請輸入您的密碼" required autocomplete="current-password">
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" id="remember">
                        <span>記住我</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="alert('請聯繫客服重置密碼')">忘記密碼？</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">登入</button>
            </form>
            
            <div class="login-footer">
                <p>還沒有帳戶？ <a href="../index.html#contact">聯繫我們開戶</a></p>
                <a href="../index.html" class="back-link">← 返回主頁</a>
            </div>
        </div>
    </div>
    
    <script>
        // Debug: Log when script loads
        console.log('Login script loaded');
        
        // Check if already logged in
        if (localStorage.getItem('aicountant-portal-logged-in') === 'true') {
            console.log('Already logged in, redirecting...');
            window.location.href = 'dashboard.html';
        }
        
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        
        // Load saved email if "remember me" was checked
        const savedEmail = localStorage.getItem('aicountant-portal-remember-email');
        if (savedEmail) {
            emailInput.value = savedEmail;
            document.getElementById('remember').checked = true;
        }
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('Form submitted');
            
            // Get values
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const remember = document.getElementById('remember').checked;
            
            // Validation
            if (!email) {
                showError('請輸入電郵地址');
                emailInput.focus();
                return;
            }
            
            if (!password) {
                showError('請輸入密碼');
                passwordInput.focus();
                return;
            }
            
            // Basic email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('請輸入有效的電郵地址');
                emailInput.focus();
                return;
            }
            
            // Show loading state
            loginBtn.classList.add('btn-loading');
            loginBtn.textContent = '登入中';
            hideError();
            
            // Simulate API call delay
            setTimeout(function() {
                console.log('Login successful for:', email);
                
                // Store login state
                localStorage.setItem('aicountant-portal-logged-in', 'true');
                localStorage.setItem('aicountant-portal-user', email);
                
                // Handle remember me
                if (remember) {
                    localStorage.setItem('aicountant-portal-remember-email', email);
                } else {
                    localStorage.removeItem('aicountant-portal-remember-email');
                }
                
                // Redirect to dashboard
                console.log('Redirecting to dashboard...');
                window.location.href = 'dashboard.html';
            }, 800);
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
        
        function hideError() {
            errorMessage.classList.remove('show');
        }
        
        // Clear error when user starts typing
        emailInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
        
        // Debug: Log localStorage state
        console.log('localStorage state:', {
            loggedIn: localStorage.getItem('aicountant-portal-logged-in'),
            user: localStorage.getItem('aicountant-portal-user'),
            rememberEmail: localStorage.getItem('aicountant-portal-remember-email')
        });
    </script>
</body>
</html>
