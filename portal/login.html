<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶登入 - AIcountant Portal</title>
    <meta name="description" content="AIcountant 客戶登入系統，管理您的財務文件和會計記錄。">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="portal.css">
</head>
<body class="portal-body">
    <div class="portal-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">AIcountant</div>
                <h1>客戶登入</h1>
                <p>歡迎回到您的財務管理中心</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">電郵地址</label>
                    <input type="email" id="email" name="email" placeholder="請輸入您的電郵" required>
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" placeholder="請輸入您的密碼" required>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>記住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘記密碼？</a>
                </div>
                <button type="submit" class="btn btn-primary btn-full">登入</button>
            </form>
            
            <div class="login-footer">
                <p>還沒有帳戶？ <a href="#contact">聯繫我們開戶</a></p>
                <a href="../index.html" class="back-link">← 返回主頁</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Demo login - in production, this would authenticate with a server
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Simple validation for demo
            if (email && password) {
                // Store login state
                localStorage.setItem('aicountant-portal-logged-in', 'true');
                localStorage.setItem('aicountant-portal-user', email);
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
