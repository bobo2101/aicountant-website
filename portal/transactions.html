<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易記錄 - AIcountant Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="portal.css">
    <style>
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-group label {
            font-size: 14px;
            color: #666;
        }
        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        .transaction-table {
            width: 100%;
            border-collapse: collapse;
        }
        .transaction-table th,
        .transaction-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .transaction-table th {
            font-weight: 600;
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
        }
        .amount-income {
            color: #2e7d32;
            font-weight: 500;
        }
        .amount-expense {
            color: #c62828;
            font-weight: 500;
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #666;
        }
        .loading-row td {
            padding: 24px;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            height: 20px;
            border-radius: 4px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        .pagination button {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button.active {
            background: #000;
            color: white;
            border-color: #000;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="portal-body">
    <div class="portal-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">AIcountant</div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><span class="icon">📊</span> 儀表板</a></li>
                    <li><a href="transactions.html" class="active"><span class="icon">💰</span> 交易記錄</a></li>
                    <li><a href="documents.html"><span class="icon">📄</span> 文件管理</a></li>
                    <li><a href="reports.html"><span class="icon">📈</span> 財務報告</a></li>
                    <li><a href="invoices.html"><span class="icon">🧾</span> 發票管理</a></li>
                    <li><a href="settings.html"><span class="icon">⚙️</span> 設置</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <span class="user-name" id="userName">載入中...</span>
                        <span class="user-role">企業帳戶</span>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()" title="登出">🚪</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1>交易記錄</h1>
                <p>查看和管理您的所有財務交易</p>
            </header>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>類型:</label>
                    <select id="filterType" onchange="loadTransactions()">
                        <option value="">全部</option>
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>類別:</label>
                    <select id="filterCategory" onchange="loadTransactions()">
                        <option value="">全部</option>
                        <option value="銷售">銷售</option>
                        <option value="服務收入">服務收入</option>
                        <option value="租金">租金</option>
                        <option value="工資">工資</option>
                        <option value="辦公費用">辦公費用</option>
                        <option value="軟件訂閱">軟件訂閱</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>開始日期:</label>
                    <input type="date" id="filterStartDate" onchange="loadTransactions()">
                </div>
                <div class="filter-group">
                    <label>結束日期:</label>
                    <input type="date" id="filterEndDate" onchange="loadTransactions()">
                </div>
            </div>

            <div class="content-card">
                <div class="card-header">
                    <h3>所有交易</h3>
                    <button class="btn btn-primary" style="padding: 8px 16px; font-size: 13px;" onclick="showAddModal()">
                        + 新增交易
                    </button>
                </div>
                <div class="card-body">
                    <table class="transaction-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>描述</th>
                                <th>類別</th>
                                <th>類型</th>
                                <th>金額</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTable">
                            <!-- Loading state -->
                            <tr class="loading-row">
                                <td colspan="7"><div class="loading-skeleton"></div></td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <!-- Pagination -->
                    <div class="pagination" id="pagination" style="display: none;">
                        <button onclick="changePage(-1)" id="prevBtn">上一頁</button>
                        <span id="pageInfo">第 1 頁</span>
                        <button onclick="changePage(1)" id="nextBtn">下一頁</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Transaction Modal -->
    <div id="addModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 16px; padding: 32px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <h3 style="margin-bottom: 24px;">新增交易</h3>
            <form id="addTransactionForm">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>類型</label>
                    <select id="newType" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px;" required>
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>日期</label>
                    <input type="date" id="newDate" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>描述</label>
                    <input type="text" id="newDescription" placeholder="例如：客戶付款" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>類別</label>
                    <input type="text" id="newCategory" placeholder="例如：銷售" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>金額 (HK$)</label>
                    <input type="number" id="newAmount" placeholder="0.00" step="0.01" min="0" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px;" required>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label>供應商/客戶</label>
                    <input type="text" id="newVendor" placeholder="可選" style="width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px;">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeAddModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Load Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-client.js"></script>

    <script>
        // ============================================
        // AUTHENTICATION CHECK
        // ============================================
        
        let currentUser = null;
        let isDemoMode = false;
        let currentPage = 1;
        const itemsPerPage = 10;
        
        // Check authentication on page load
        (async function init() {
            try {
                // Check if Supabase is configured
                if (SUPABASE_URL.includes('your-project-ref') || SUPABASE_ANON_KEY.includes('your-anon-key')) {
                    console.log('⚠️ Supabase not configured, using demo mode');
                    isDemoMode = true;
                    
                    // Check localStorage fallback
                    const localLoggedIn = localStorage.getItem('aicountant-portal-logged-in') === 'true';
                    if (!localLoggedIn) {
                        window.location.href = 'login.html';
                        return;
                    }
                    
                    const userEmail = localStorage.getItem('aicountant-portal-user') || 'Demo User';
                    currentUser = { email: userEmail };
                    loadDemoTransactions();
                } else {
                    // Real Supabase auth check
                    const user = await getCurrentUser();
                    if (!user) {
                        window.location.href = 'login.html';
                        return;
                    }
                    
                    currentUser = user;
                    loadTransactions();
                }
                
                // Display user info
                updateUserDisplay();
                
                // Set default date to today
                document.getElementById('newDate').valueAsDate = new Date();
                
            } catch (error) {
                console.error('Initialization error:', error);
            }
        })();
        
        // ============================================
        // LOAD TRANSACTIONS
        // ============================================
        
        async function loadTransactions() {
            if (isDemoMode) {
                loadDemoTransactions();
                return;
            }
            
            try {
                const filters = {
                    type: document.getElementById('filterType').value,
                    category: document.getElementById('filterCategory').value,
                    startDate: document.getElementById('filterStartDate').value,
                    endDate: document.getElementById('filterEndDate').value
                };
                
                // Remove empty filters
                Object.keys(filters).forEach(key => {
                    if (!filters[key]) delete filters[key];
                });
                
                const { data: transactions, error } = await getTransactions(filters);
                
                if (error) throw error;
                
                renderTransactions(transactions || []);
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionsTable').innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <p>載入失敗，請重新整理頁面</p>
                        </td>
                    </tr>
                `;
            }
        }
        
        function renderTransactions(transactions) {
            const tbody = document.getElementById('transactionsTable');
            
            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <p>暫無交易記錄</p>
                            <p style="font-size: 13px; margin-top: 8px;">點擊「新增交易」添加第一筆記錄</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = transactions.map(t => `
                <tr>
                    <td>${formatDate(t.transaction_date)}</td>
                    <td>${escapeHtml(t.description)}</td>
                    <td>${escapeHtml(t.category)}</td>
                    <td>${t.type === 'income' ? '收入' : '支出'}</td>
                    <td class="${t.type === 'income' ? 'amount-income' : 'amount-expense'}">
                        ${t.type === 'income' ? '+' : '-'}HK$ ${parseFloat(t.amount).toLocaleString()}
                    </td>
                    <td><span class="status-badge ${getStatusClass(t.status)}">${getStatusLabel(t.status)}</span></td>
                    <td>
                        <button class="btn-icon" onclick="editTransaction('${t.id}')" title="編輯">✏️</button>
                        <button class="btn-icon" onclick="deleteTransaction('${t.id}')" title="刪除">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // ============================================
        // DEMO DATA
        // ============================================
        
        function loadDemoTransactions() {
            const demoData = [
                { id: '1', transaction_date: '2024-03-10', description: '客戶付款 - ABC公司', category: '銷售', type: 'income', amount: 15000, status: 'completed' },
                { id: '2', transaction_date: '2024-03-09', description: '辦公室租金', category: '租金', type: 'expense', amount: 8500, status: 'completed' },
                { id: '3', transaction_date: '2024-03-08', description: '軟件訂閱 - QuickBooks', category: '軟件訂閱', type: 'expense', amount: 450, status: 'completed' },
                { id: '4', transaction_date: '2024-03-07', description: '客戶付款 - XYZ有限公司', category: '銷售', type: 'income', amount: 28000, status: 'pending' },
                { id: '5', transaction_date: '2024-03-06', description: '員工薪資', category: '工資', type: 'expense', amount: 35000, status: 'processing' }
            ];
            renderTransactions(demoData);
        }
        
        // ============================================
        // ADD TRANSACTION
        // ============================================
        
        function showAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('addTransactionForm').reset();
            document.getElementById('newDate').valueAsDate = new Date();
        }
        
        document.getElementById('addTransactionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (isDemoMode) {
                alert('演示模式：無法保存數據。請配置 Supabase 以使用完整功能。');
                closeAddModal();
                return;
            }
            
            const transaction = {
                transaction_date: document.getElementById('newDate').value,
                description: document.getElementById('newDescription').value,
                category: document.getElementById('newCategory').value,
                type: document.getElementById('newType').value,
                amount: parseFloat(document.getElementById('newAmount').value),
                vendor_customer: document.getElementById('newVendor').value,
                status: 'completed'
            };
            
            try {
                const { data, error } = await createTransaction(transaction);
                
                if (error) throw error;
                
                closeAddModal();
                loadTransactions();
                alert('交易已添加！');
            } catch (error) {
                console.error('Error creating transaction:', error);
                alert('添加失敗：' + error.message);
            }
        });
        
        // ============================================
        // EDIT & DELETE
        // ============================================
        
        async function editTransaction(id) {
            if (isDemoMode) {
                alert('演示模式：無法編輯數據');
                return;
            }
            alert('編輯功能開發中...');
        }
        
        async function deleteTransaction(id) {
            if (!confirm('確定要刪除此交易嗎？')) return;
            
            if (isDemoMode) {
                alert('演示模式：無法刪除數據');
                return;
            }
            
            try {
                const { error } = await deleteTransaction(id);
                if (error) throw error;
                loadTransactions();
                alert('已刪除！');
            } catch (error) {
                console.error('Error deleting:', error);
                alert('刪除失敗');
            }
        }
        
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        
        function updateUserDisplay() {
            if (!currentUser) return;
            const userName = currentUser.email ? currentUser.email.split('@')[0] : '用戶';
            document.getElementById('userName').textContent = userName;
        }
        
        function handleLogout() {
            if (isDemoMode) {
                localStorage.removeItem('aicountant-portal-logged-in');
                localStorage.removeItem('aicountant-portal-user');
                window.location.href = 'login.html';
            } else {
                signOut();
            }
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-HK');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getStatusClass(status) {
            const classes = {
                'completed': 'status-completed',
                'pending': 'status-pending',
                'processing': 'status-processing'
            };
            return classes[status] || 'status-pending';
        }
        
        function getStatusLabel(status) {
            const labels = {
                'completed': '已完成',
                'pending': '待處理',
                'processing': '處理中'
            };
            return labels[status] || status;
        }
        
        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            loadTransactions();
        }
        
        // Close modal when clicking outside
        document.getElementById('addModal').addEventListener('click', (e) => {
            if (e.target.id === 'addModal') {
                closeAddModal();
            }
        });
    </script>
</body>
</html>
