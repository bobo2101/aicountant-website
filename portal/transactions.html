<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易記錄 - AIcountant Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="portal.css">
</head>
<body class="portal-body">
    <div class="portal-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">AIcountant</div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><span class="icon">📊</span> 儀表板</a></li>
                    <li><a href="transactions.html" class="active"><span class="icon">💰</span> 交易記錄</a></li>
                    <li><a href="documents.html"><span class="icon">📄</span> 文件管理</a></li>
                    <li><a href="reports.html"><span class="icon">📈</span> 財務報告</a></li>
                    <li><a href="invoices.html"><span class="icon">🧾</span> 發票管理</a></li>
                    <li><a href="settings.html"><span class="icon">⚙️</span> 設置</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <span class="user-name" id="userName">客戶名稱</span>
                        <span class="user-role">企業帳戶</span>
                    </div>
                    <button class="logout-btn" onclick="logout()" title="登出">🚪</button>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="page-header">
                <h1>交易記錄</h1>
                <p>查看和管理您的所有財務交易</p>
            </header>
            <div class="content-card">
                <div class="card-header">
                    <h3>所有交易</h3>
                    <button class="btn btn-primary" style="padding: 8px 16px; font-size: 13px;">+ 新增交易</button>
                </div>
                <div class="card-body">
                    <p style="color: #666; text-align: center; padding: 48px 0;">交易記錄功能開發中...</p>
                </div>
            </div>
        </main>
    </div>
    <script>
        if (!localStorage.getItem('aicountant-portal-logged-in')) {
            window.location.href = 'login.html';
        }
        const userEmail = localStorage.getItem('aicountant-portal-user');
        if (userEmail) {
            document.getElementById('userName').textContent = userEmail.split('@')[0];
        }
        function logout() {
            localStorage.removeItem('aicountant-portal-logged-in');
            localStorage.removeItem('aicountant-portal-user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
