<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付成功 - AIcountant</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .success-card {
      background: white;
      padding: 50px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .success-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 50px;
      color: white;
    }
    .success-title {
      font-size: 28px;
      margin-bottom: 15px;
      color: #333;
    }
    .success-message {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .order-details {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 30px;
      text-align: left;
    }
    .order-details h3 {
      margin-bottom: 15px;
      color: #333;
      font-size: 18px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      color: #666;
    }
    .detail-value {
      color: #333;
      font-weight: 500;
    }
    .status-badge {
      display: inline-block;
      background: #4caf50;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
    }
    .next-steps {
      margin-top: 25px;
      padding: 20px;
      background: #e3f2fd;
      border-radius: 10px;
      text-align: left;
    }
    .next-steps h4 {
      color: #1976d2;
      margin-bottom: 10px;
    }
    .next-steps ul {
      margin: 0;
      padding-left: 20px;
      color: #555;
    }
    .next-steps li {
      margin: 8px 0;
    }
    @media (max-width: 480px) {
      .success-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h1 class="success-title">支付成功！</h1>
      <p class="success-message">
        感謝您選擇 AIcountant！我們已收到您的付款，專業團隊將在 24 小時內與您聯繫。
      </p>
      
      <div class="order-details">
        <h3>訂單詳情</h3>
        <div class="detail-row">
          <span class="detail-label">訂單編號</span>
          <span class="detail-value" id="session-id">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">服務項目</span>
          <span class="detail-value" id="service-name">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">支付金額</span>
          <span class="detail-value" id="amount">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">支付時間</span>
          <span class="detail-value" id="payment-time">-</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">訂單狀態</span>
          <span class="detail-value"><span class="status-badge">已確認</span></span>
        </div>
      </div>
      
      <div class="next-steps">
        <h4>📋 下一步</h4>
        <ul>
          <li>查收確認郵件（已發送至您的郵箱）</li>
          <li>準備相關公司文件</li>
          <li>等待專屬顧問致電確認詳情</li>
          <li>開始享受 AIcountant 專業服務</li>
        </ul>
      </div>
      
      <div style="margin-top: 30px;">
        <a href="index.html" class="btn btn-primary" style="margin-right: 10px;">返回首頁</a>
        <a href="mailto:contact@aicountant.com" class="btn btn-secondary">聯繫客服</a>
      </div>
    </div>
  </div>
  
  <script>
    // 從 URL 獲取參數
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');
    
    // 顯示訂單信息
    if (sessionId) {
      document.getElementById('session-id').textContent = sessionId.substring(0, 20) + '...';
    }
    document.getElementById('payment-time').textContent = new Date().toLocaleString('zh-HK');
    
    // 可選：從後端獲取詳細訂單信息
    // fetch('/api/get-session?session_id=' + sessionId)
  </script>
</body>
</html>
