<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支付取消 - AIcountant</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cancel-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 20px;
    }
    .cancel-card {
      background: white;
      padding: 50px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .cancel-icon {
      width: 80px;
      height: 80px;
      background: #ff9800;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      font-size: 40px;
      color: white;
    }
    .cancel-title {
      font-size: 26px;
      margin-bottom: 15px;
      color: #333;
    }
    .cancel-message {
      color: #666;
      margin-bottom: 25px;
      line-height: 1.6;
    }
    .help-section {
      background: #fff3e0;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      text-align: left;
    }
    .help-section h4 {
      color: #e65100;
      margin-bottom: 10px;
    }
    .help-section p {
      color: #666;
      margin: 0;
    }
    .btn-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .contact-info {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid #e0e0e0;
    }
    .contact-info h4 {
      margin-bottom: 15px;
      color: #333;
    }
    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
      color: #666;
    }
    @media (max-width: 480px) {
      .cancel-card {
        padding: 30px 20px;
      }
      .btn-group {
        flex-direction: column;
      }
      .btn-group .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="cancel-page">
    <div class="cancel-card">
      <div class="cancel-icon">!</div>
      <h1 class="cancel-title">支付已取消</h1>
      <p class="cancel-message">
        您已取消支付。您的信用卡不會被扣款。<br>
        如有疑問或需要幫助，請隨時聯繫我們。
      </p>
      
      <div class="help-section">
        <h4>🤔 為什麼取消了？</h4>
        <p>常見原因：想更改服務計劃、支付方式問題、或需要更多信息。我們的團隊隨時為您解答！</p>
      </div>
      
      <div class="btn-group">
        <a href="index.html#services" class="btn btn-primary">重新選擇服務</a>
        <a href="index.html#contact" class="btn btn-secondary">聯繫客服</a>
      </div>
      
      <div class="contact-info">
        <h4>其他聯繫方式</h4>
        <div class="contact-item">
          <span>📞</span>
          <span>400-123-4567</span>
        </div>
        <div class="contact-item">
          <span>✉️</span>
          <span>contact@aicountant.com</span>
        </div>
        <div class="contact-item">
          <span>💬</span>
          <span>微信：AIcountant</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
